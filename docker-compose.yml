version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ems-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: enterprise_ems_docker
    ports:
      - "5433:5432" # Mapping to 5433 to avoid conflict with local postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: ems-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/enterprise_ems_docker?schema=public
      - JWT_SECRET=supersecretjwtkey
      - PORT=5000
    depends_on:
      - db
    # In production, we'd use a wait-for-it script to ensure DB is up before migration,
    # but here we can just map the command to apply migrations then start.
    command: >
      sh -c "npx prisma migrate deploy && node src/index.js"

  frontend:
    build:
      context: ./frontend
    container_name: ems-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
